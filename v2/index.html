<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#101820">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Grid Down: Get Home — a Game Boy-style survival adventure. The grid failed. You are 38 miles from home. Walk.">
<title>Grid Down: Get Home — V2 Preview</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #101820;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: monospace;
    padding-top: env(safe-area-inset-top);
  }
  #err { color: #f8f4e4; font-size: 14px; padding: 4px; }
  #screen {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #101820;
    margin-top: 4px;
    flex-shrink: 0;
  }
  #deck {
    display: none;
    flex: 1;
    width: 100%;
    max-width: 560px;
    position: relative;
    padding-bottom: env(safe-area-inset-bottom);
  }
  #dpadZone {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 55%;
    touch-action: none;
  }
  #dpad {
    position: absolute;
    left: 18px; top: 50%;
    width: 132px; height: 132px;
    margin-top: -66px;
    opacity: 0.55;
    pointer-events: none;
    transition: opacity 0.1s;
  }
  #dpad.on { opacity: 0.95; }
  .dbar {
    position: absolute;
    background: #26303c;
    border: 2px solid #8ca4b4;
    border-radius: 10px;
  }
  .dbar.v { left: 45px; top: 0; width: 42px; height: 132px; }
  .dbar.h { left: 0; top: 45px; width: 132px; height: 42px; }
  .darm { position: absolute; width: 0; height: 0; border: 10px solid transparent; }
  .darm.up    { left: 56px; top: 10px; border-bottom: 14px solid #8ca4b4; border-top: 0; }
  .darm.down  { left: 56px; bottom: 10px; border-top: 14px solid #8ca4b4; border-bottom: 0; }
  .darm.left  { left: 10px; top: 56px; border-right: 14px solid #8ca4b4; border-left: 0; }
  .darm.right { right: 10px; top: 56px; border-left: 14px solid #8ca4b4; border-right: 0; }
  #dpad.dir-up .darm.up { border-bottom-color: #f05858; }
  #dpad.dir-down .darm.down { border-top-color: #f05858; }
  #dpad.dir-left .darm.left { border-right-color: #f05858; }
  #dpad.dir-right .darm.right { border-left-color: #f05858; }
  .btn {
    position: absolute;
    border-radius: 50%;
    background: #26303c;
    border: 3px solid #8ca4b4;
    color: #f8f4e4;
    font-size: 22px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }
  .btn.on { background: #c03028; color: #f8f4e4; }
  #btnA { right: 18px; top: 22%; width: 76px; height: 76px; }
  #btnB { right: 104px; top: 45%; width: 64px; height: 64px; }
  #btnStart {
    left: 50%; bottom: 10px;
    transform: translateX(-50%);
    width: 84px; height: 30px;
    border-radius: 15px;
    font-size: 12px;
  }
</style>
</head>
<body>
<div id="err"></div>
<canvas id="screen" width="160" height="144"></canvas>
<div id="deck">
  <div id="dpadZone">
    <div id="dpad">
      <div class="dbar v"></div>
      <div class="dbar h"></div>
      <div class="darm up"></div>
      <div class="darm down"></div>
      <div class="darm left"></div>
      <div class="darm right"></div>
    </div>
  </div>
  <div class="btn" id="btnA">A</div>
  <div class="btn" id="btnB">B</div>
  <div class="btn" id="btnStart">START</div>
</div>
<script src="js/data-tiles.js"></script>
<script src="js/data-sprites.js"></script>
<script src="js/data-font.js"></script>
<script src="js/data-maps.js"></script>
<script src="js/data-dialog.js"></script>
<script src="js/data-items.js"></script>
<script src="js/legend.js"></script>
<script src="js/audio.js"></script>
<script src="js/save.js"></script>
<script src="js/render.js"></script>
<script src="js/input.js"></script>
<script src="js/survival.js"></script>
<script src="js/actors.js"></script>
<script src="js/camp.js"></script>
<script src="js/main.js"></script>
</body>
</html>
